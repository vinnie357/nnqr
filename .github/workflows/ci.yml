  lua-love2d:
    name: Lua/Love2D
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: lua/love2d
    steps:
      - uses: actions/checkout@v4
      - uses: ./.github/actions/setup-mise
      - name: Cache LuaRocks packages
        uses: actions/cache@v4
        with:
          path: ~/.luarocks
          key: luarocks-${{ runner.os }}-busted
          restore-keys: |
            luarocks-${{ runner.os }}-
      - name: Install tools
        run: mise trust && mise install
      - name: Run CI
        run: mise run lua-ci
