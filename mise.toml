[tools]
node = 'lts'
"ubi:nushell/nushell" = { version = "latest", exe = "nu" }
act = "latest"  # Local GitHub Actions testing

# Lightweight SQLite-backed issue tracker (no git hooks; manual `bees sync` export)
[tools."github:ctxshift/bees"]
version = "latest"

[tools."github:ctxshift/bees".platforms]
linux-x64 = { asset_pattern = "bees-linux-x86_64.tar.gz" }
linux-arm64 = { asset_pattern = "bees-linux-aarch64.tar.gz" }
macos-arm64 = { asset_pattern = "bees-macos-aarch64.tar.gz" }
macos-x64 = { asset_pattern = "bees-macos-x86_64.tar.gz" }

[env]
RUST_BACKTRACE = "1"

# ============================================================================
# RUST/BEVY TASKS
# ============================================================================

[tasks.rust-start]
description = "Run Bevy Quadradius in development mode"
dir = "rust/bevy"
run = "cargo run"

[tasks.rust-start-release]
description = "Run Bevy Quadradius in optimized release mode"
dir = "rust/bevy"
run = "cargo run --release"

[tasks.rust-start-debug]
description = "Run Bevy Quadradius with debug logging"
dir = "rust/bevy"
env = { RUST_LOG = "debug" }
run = "cargo run"

[tasks.rust-start-info]
description = "Run Bevy Quadradius with info logging"
dir = "rust/bevy"
env = { RUST_LOG = "info" }
run = "cargo run --release"

[tasks.rust-build]
description = "Build Bevy Quadradius"
dir = "rust/bevy"
run = "cargo build"

[tasks.rust-build-release]
description = "Build Bevy Quadradius (optimized)"
dir = "rust/bevy"
run = "cargo build --release"

[tasks.rust-test]
description = "Run all Bevy tests"
dir = "rust/bevy"
run = "cargo test"

[tasks.rust-test-verbose]
description = "Run Bevy tests with verbose output"
dir = "rust/bevy"
run = "cargo test -- --nocapture"

[tasks.rust-test-powers]
description = "Run power system tests"
dir = "rust/bevy"
run = "cargo test powers"

[tasks.rust-check]
description = "Run cargo check"
dir = "rust/bevy"
run = "cargo check"

[tasks.rust-clippy]
description = "Run clippy linter"
dir = "rust/bevy"
run = "cargo clippy -- -D warnings"

[tasks.rust-fmt]
description = "Format Rust code with rustfmt"
dir = "rust/bevy"
run = "cargo fmt"

[tasks.rust-fmt-check]
description = "Check Rust code formatting"
dir = "rust/bevy"
run = "cargo fmt -- --check"

[tasks.rust-clean]
description = "Clean Bevy build artifacts"
dir = "rust/bevy"
run = "cargo clean"

[tasks.rust-dev]
description = "Quick Bevy development workflow: check, test, start"
depends = ["rust-check", "rust-test", "rust-start"]

# ============================================================================
# LUA/LOVE2D TASKS (delegates to lua/love2d/mise.toml)
# ============================================================================

[tasks.love-start]
description = "Run Love2D Quadradius"
run = "mise run -C lua/love2d start"

[tasks.love-debug]
description = "Run Love2D with debug console"
run = "mise run -C lua/love2d debug"

[tasks.love-fmt]
description = "Format Lua code with stylua"
run = "mise run -C lua/love2d fmt"

[tasks.love-check]
description = "Check Lua code formatting"
run = "mise run -C lua/love2d check"

[tasks.love-test]
description = "Run Love2D tests in-game"
run = "mise run -C lua/love2d test"

[tasks.love-test-busted]
description = "Run Lua unit tests with busted"
run = "mise run -C lua/love2d test-busted"

[tasks.love-setup]
description = "Install luarocks and busted for Love2D testing"
run = "mise run -C lua/love2d setup"

# ============================================================================
# BEES ISSUE TRACKING TASKS
# ============================================================================

[tasks.bees-ready]
description = "Show bees issues ready to work on (no blockers)"
run = "bees ready"

[tasks.bees-list]
description = "List all open bees issues"
run = "bees list"

[tasks.bees-sync]
description = "Export bees database to .bees/issues.jsonl"
run = "bees sync"

[tasks.bees-prime]
description = "Dump bees issues as AI context (markdown)"
run = "bees prime"

# ============================================================================
# CI/CD TASKS
# ============================================================================

[tasks.lua-ci]
description = "Lua/Love2D CI workflow"
run = "mise run -C lua/love2d ci"

[tasks.rust-ci]
description = "Rust/Bevy CI workflow"
run = "mise run -C rust/bevy ci"

[tasks.web-dev]
description = "Run the web implementation dev server (localhost:1425)"
run = "mise run -C web dev"

[tasks.web-test]
description = "Web implementation unit tests"
run = "mise run -C web test"

[tasks.web-ci]
description = "Web implementation CI workflow"
run = "mise run -C web ci"

[tasks.ci]
description = "CI workflow: runs all implementation test suites"
depends = ["lua-ci", "rust-ci", "web-ci"]

[tasks.precommit]
description = "Alias for ci task"
depends = ["ci"]

# Nushell-based tasks (Bevy)
[tasks.test-powers-nu]
description = "Run power system test (nushell version)"
dir = "rust/bevy"
run = "nu test_powers.nu"

[tasks.fix-warnings]
description = "Fix all unused variable warnings (nushell version)"
dir = "rust/bevy"
run = "nu fix_unused_warnings.nu"

[tasks.fix-critical]
description = "Fix critical warnings (nushell version)"
dir = "rust/bevy"
run = "nu fix_critical_warnings.nu"

# Quadradius Development Utility (qdev)
[tasks.qdev]
description = "Quadradius development utility - run 'mise run qdev' for help"
dir = "rust/bevy"
run = "nu qdev.nu"

[tasks.quality]
description = "Run full quality check workflow"
dir = "rust/bevy"
run = "nu qdev.nu quality"

[tasks.stats]
description = "Show project statistics"
dir = "rust/bevy"
run = "nu qdev.nu stats"

# Git helpers (qgit)
[tasks.qgit]
description = "Git helper utility - run 'mise run qgit' for help"
dir = "rust/bevy"
run = "nu qgit.nu"

[tasks.git-status]
description = "Enhanced git status"
dir = "rust/bevy"
run = "nu qgit.nu status"

[tasks.git-log]
description = "Pretty git log"
dir = "rust/bevy"
run = "nu qgit.nu log"

# ============================================================================
# CI/CD TESTING TASKS
# ============================================================================

[tasks."colima:start"]
description = "Start colima with Docker runtime (macOS only)"
run = """
#!/usr/bin/env nu

# Only run on macOS
if $nu.os-info.name != "macos" {
    print "⚠️  Colima is only available on macOS. Ubuntu/Linux has native Docker."
    exit 0
}

# Use mise exec to run colima with temporary tool activation
print "📦 Checking colima status..."
let status = (mise exec lima@latest colima@latest -- colima status --profile default | complete)
if $status.exit_code != 0 {
    print "🚀 Starting colima..."
    mise exec lima@latest colima@latest -- colima start --vm-type vz --vz-rosetta --runtime docker
} else {
    print "✅ Colima is already running"
}
"""

[tasks."colima:stop"]
description = "Stop colima"
run = """
#!/usr/bin/env nu

# Only run on macOS
if $nu.os-info.name != "macos" {
    print "⚠️  Colima is only available on macOS."
    exit 0
}

mise exec lima@latest colima@latest -- colima stop
"""

[tasks."test:action"]
description = "Test GitHub action locally using act (tests pull_request workflow)"
run = """
#!/usr/bin/env nu

# Detect OS and set flags for Mac
let act_flags = if $nu.os-info.name == "macos" {
    [
        "--container-architecture" "linux/amd64"
        "--container-daemon-socket" "-"
        "-P" "ubuntu-latest=catthehacker/ubuntu:act-latest"
    ]
} else {
    [
        "-P" "ubuntu-latest=catthehacker/ubuntu:act-latest"
    ]
}

act pull_request ...$act_flags
"""

[tasks."test:action:pr"]
description = "Test GitHub action for pull_request workflow"
run = """
#!/usr/bin/env nu

let colima_socket = $"($env.HOME)/.colima/docker.sock"
let use_colima = ($colima_socket | path exists)

# Set DOCKER_HOST for colima
if $use_colima {
    $env.DOCKER_HOST = $"unix://($colima_socket)"
}

let act_flags = if $nu.os-info.name == "macos" {
    [
        "--container-architecture" "linux/amd64"
        "--container-daemon-socket" "-"
        "-P" "ubuntu-latest=catthehacker/ubuntu:act-latest"
    ]
} else {
    [
        "-P" "ubuntu-latest=catthehacker/ubuntu:act-latest"
    ]
}

act pull_request ...$act_flags
"""

[tasks."test:action:push"]
description = "Test GitHub action for push to main workflow"
run = """
#!/usr/bin/env nu

let colima_socket = $"($env.HOME)/.colima/docker.sock"
let use_colima = ($colima_socket | path exists)

# Set DOCKER_HOST for colima
if $use_colima {
    $env.DOCKER_HOST = $"unix://($colima_socket)"
}

let act_flags = if $nu.os-info.name == "macos" {
    [
        "--container-architecture" "linux/amd64"
        "--container-daemon-socket" "-"
        "-P" "ubuntu-latest=catthehacker/ubuntu:act-latest"
    ]
} else {
    [
        "-P" "ubuntu-latest=catthehacker/ubuntu:act-latest"
    ]
}

act push ...$act_flags
"""

# ============================================================================
# SECURITY TASKS
# ============================================================================

[tasks.gitleaks]
description = "Run gitleaks secret scanner (Apple Container runtime)"
run = """
#!/usr/bin/env nu

let repo_root = (git rev-parse --show-toplevel | str trim)
let image = "zricethezav/gitleaks"

# Build gitleaks arguments
mut args = ["detect" "--source=/code" "-v"]

# Auto-detect baseline file
let baseline_path = ($repo_root | path join ".gitleaks-baseline.json")
if ($baseline_path | path exists) {
    let baseline_name = ($baseline_path | path basename)
    $args = ($args | append $"--baseline-path=/code/($baseline_name)")
    print $"📋 Using baseline: ($baseline_name)"
}

# Ensure Apple Container is running
if (which container | is-empty) {
    print "❌ Apple Container CLI not found. Use mise gitleaks:docker or mise gitleaks:colima"
    exit 1
}

let status = (do { ^container system status } | complete)
if $status.exit_code != 0 {
    print "🚀 Starting Apple Container..."
    do { ^container system start } | complete
}

let final_args = $args
print $"🔍 Scanning: ($repo_root)"
let result = (do { ^container run --rm -v $"($repo_root):/code" $image ...$final_args } | complete)
print $result.stdout

if $result.exit_code == 0 {
    print "✅ No secrets detected"
} else if $result.exit_code == 1 {
    print "❌ Secrets detected!"
    print $result.stderr
} else {
    print $"❌ Error: ($result.stderr)"
}

exit $result.exit_code
"""

[tasks."gitleaks:docker"]
description = "Run gitleaks secret scanner (Docker runtime)"
run = """
#!/usr/bin/env nu

let repo_root = (git rev-parse --show-toplevel | str trim)
let image = "zricethezav/gitleaks"

mut args = ["detect" "--source=/code" "-v"]

let baseline_path = ($repo_root | path join ".gitleaks-baseline.json")
if ($baseline_path | path exists) {
    let baseline_name = ($baseline_path | path basename)
    $args = ($args | append $"--baseline-path=/code/($baseline_name)")
    print $"📋 Using baseline: ($baseline_name)"
}

if (which docker | is-empty) {
    print "❌ Docker CLI not found"
    exit 1
}

let status = (do { ^docker info } | complete)
if $status.exit_code != 0 {
    print "🚀 Starting Docker..."
    if $nu.os-info.name == "macos" {
        do { ^open -a Docker } | complete
        print "Waiting for Docker to start..."
        mut attempts = 0
        loop {
            sleep 2sec
            $attempts = $attempts + 1
            let check = (do { ^docker info } | complete)
            if $check.exit_code == 0 { break }
            if $attempts >= 30 {
                print "❌ Docker failed to start"
                exit 1
            }
        }
    } else {
        print "❌ Docker is not running. Start it manually."
        exit 1
    }
}

let final_args = $args
print $"🔍 Scanning: ($repo_root)"
let result = (do { ^docker run --rm -v $"($repo_root):/code" $image ...$final_args } | complete)
print $result.stdout

if $result.exit_code == 0 {
    print "✅ No secrets detected"
} else if $result.exit_code == 1 {
    print "❌ Secrets detected!"
    print $result.stderr
} else {
    print $"❌ Error: ($result.stderr)"
}

exit $result.exit_code
"""

[tasks."gitleaks:colima"]
description = "Run gitleaks secret scanner (Colima runtime)"
run = """
#!/usr/bin/env nu

if $nu.os-info.name != "macos" {
    print "⚠️  Colima is only available on macOS"
    exit 1
}

let repo_root = (git rev-parse --show-toplevel | str trim)
let image = "zricethezav/gitleaks"

mut args = ["detect" "--source=/code" "-v"]

let baseline_path = ($repo_root | path join ".gitleaks-baseline.json")
if ($baseline_path | path exists) {
    let baseline_name = ($baseline_path | path basename)
    $args = ($args | append $"--baseline-path=/code/($baseline_name)")
    print $"📋 Using baseline: ($baseline_name)"
}

let status = (do { ^mise exec lima@latest colima@latest -- colima status } | complete)
if $status.exit_code != 0 {
    print "🚀 Starting Colima..."
    do { ^mise exec lima@latest colima@latest -- colima start } | complete
}

let final_args = $args
print $"🔍 Scanning: ($repo_root)"
let result = (do { ^mise exec lima@latest colima@latest -- docker run --rm -v $"($repo_root):/code" $image ...$final_args } | complete)
print $result.stdout

if $result.exit_code == 0 {
    print "✅ No secrets detected"
} else if $result.exit_code == 1 {
    print "❌ Secrets detected!"
    print $result.stderr
} else {
    print $"❌ Error: ($result.stderr)"
}

exit $result.exit_code
"""

[tasks."gitleaks:stop"]
description = "Stop all container runtimes"
run = """
#!/usr/bin/env nu

print "🛑 Stopping container runtimes..."

# Stop Apple Container
if (which container | is-not-empty) {
    let status = (do { ^container system status } | complete)
    if $status.exit_code == 0 {
        print "  Stopping Apple Container..."
        do { ^container system stop } | complete
        print "  ✅ Apple Container stopped"
    }
}

# Stop Docker
if (which docker | is-not-empty) {
    let status = (do { ^docker info } | complete)
    if $status.exit_code == 0 {
        print "  Stopping Docker..."
        if $nu.os-info.name == "macos" {
            do { ^osascript -e 'quit app "Docker"' } | complete
            print "  ✅ Docker stopped"
        } else {
            print "  ⚠️  Stop Docker manually (systemctl stop docker)"
        }
    }
}

# Stop Colima
if $nu.os-info.name == "macos" and (which mise | is-not-empty) {
    let status = (do { ^mise exec lima@latest colima@latest -- colima status } | complete)
    if $status.exit_code == 0 {
        print "  Stopping Colima..."
        do { ^mise exec lima@latest colima@latest -- colima stop } | complete
        print "  ✅ Colima stopped"
    }
}

print "✨ Done"
"""

[tasks."gitleaks:stop:container"]
description = "Stop Apple Container runtime"
run = """
#!/usr/bin/env nu

if (which container | is-empty) {
    print "⚠️  Apple Container CLI not found"
    exit 0
}

let status = (do { ^container system status } | complete)
if $status.exit_code != 0 {
    print "✅ Apple Container is not running"
    exit 0
}

print "🛑 Stopping Apple Container..."
do { ^container system stop } | complete
print "✅ Apple Container stopped"
"""

[tasks."gitleaks:stop:docker"]
description = "Stop Docker runtime"
run = """
#!/usr/bin/env nu

if (which docker | is-empty) {
    print "⚠️  Docker CLI not found"
    exit 0
}

let status = (do { ^docker info } | complete)
if $status.exit_code != 0 {
    print "✅ Docker is not running"
    exit 0
}

print "🛑 Stopping Docker..."
if $nu.os-info.name == "macos" {
    do { ^osascript -e 'quit app "Docker"' } | complete
    print "✅ Docker stopped"
} else {
    print "⚠️  On Linux, stop Docker manually: sudo systemctl stop docker"
}
"""

[tasks."gitleaks:stop:colima"]
description = "Stop Colima runtime"
run = """
#!/usr/bin/env nu

if $nu.os-info.name != "macos" {
    print "⚠️  Colima is only available on macOS"
    exit 0
}

let status = (do { ^mise exec lima@latest colima@latest -- colima status } | complete)
if $status.exit_code != 0 {
    print "✅ Colima is not running"
    exit 0
}

print "🛑 Stopping Colima..."
do { ^mise exec lima@latest colima@latest -- colima stop } | complete
print "✅ Colima stopped"
"""
