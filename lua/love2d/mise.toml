[tools]
lua = '5.1'
stylua = 'latest'
"ubi:nushell/nushell" = { version = "latest", exe = "nu" }
"ubi:love2d/love" = { version = "11.5", matching = "macos", extract_all = true, bin_path = "Contents/MacOS" }
"github:luarocks/luarocks" = "3.12.2"

[env]
# Love2D uses bundled LuaJIT - no separate lua needed for runtime
# but we need lua for luarocks/busted testing

[tasks.start]
description = "Run Love2D Quadradius"
run = "love ."

[tasks.debug]
description = "Run Love2D with debug console"
run = "love . --console"

[tasks.fmt]
description = "Format Lua code with stylua"
run = "stylua --glob '**/*.lua' --glob '!lib/**' --glob '!test/**' ."

[tasks.check]
description = "Check Lua code formatting"
run = "stylua --check --glob '**/*.lua' --glob '!lib/**' --glob '!test/**' ."

[tasks.setup]
description = "Install busted test framework"
run = """
#!/usr/bin/env nu

print "📦 Installing busted..."
# Use --tree for root (CI/Docker), --local for regular users
# Use mise exec to ensure luarocks is in PATH, --lua-version 5.1 for prebuilt binary
if (id -u | into int) == 0 {
    mise exec -- luarocks --lua-version 5.1 install busted --tree ~/.luarocks
} else {
    mise exec -- luarocks --lua-version 5.1 install busted --local
}
print "✅ busted installed"
"""

[tasks.test]
description = "Run Love2D tests in-game (lovetest)"
run = "love . --test"

[tasks.test-busted]
description = "Run Lua unit tests with busted"
depends = ["setup"]
run = """
export PATH="$HOME/.luarocks/bin:$PATH"
export LUA_PATH="$HOME/.luarocks/share/lua/5.1/?.lua;$HOME/.luarocks/share/lua/5.1/?/init.lua;./?.lua;./src/?.lua;./src/client/?.lua;./server/?.lua;;"
export LUA_CPATH="$HOME/.luarocks/lib/lua/5.1/?.so;;"
busted spec/
"""

[tasks.ci]
description = "CI/precommit: format check and unit tests (no GUI)"
depends = ["check", "test-busted"]

[tasks.precommit]
description = "Alias for ci task"
depends = ["ci"]

[tasks.server]
description = "Run NNQR multiplayer server (headless)"
dir = "server"
run = "love ."

[tasks.server-gui]
description = "Run NNQR multiplayer server with GUI"
dir = "server"
run = "love . --gui"
